name: Generate and Deploy 200 Heavy Graphics Games

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Base Dependencies
      run: |
        npm init -y
        npm install axios

    - name: Generate 200 Unique Games
      run: node generator.js

    - name: Register Apps to Catappult Panel
      env:
        MY_APTOIDE_TOKEN: ${{ secrets.CATA_CLIENT_ID }}
      run: |
        node -e "
        const axios = require('axios');
        const fs = require('fs');

        async function deploy() {
          const token = process.env.MY_APTOIDE_TOKEN;
          const metadata = JSON.parse(fs.readFileSync('dist/games_metadata.json', 'utf8'));

          console.log('Registering slots on Catappult...');

          for (const game of metadata) {
            try {
              // درخواست استاندارد ثبت پکیج‌نام جدید در پنل توسعه‌دهنده
              const response = await axios.post('https://api.catappult.io/v1/applications', {
                packageName: game.packageName,
                title: game.name,
                description: game.description,
                category: 'GAME_RACING'
              }, { 
                headers: { 
                  'Authorization': 'Bearer ' + token,
                  'Content-Type': 'application/json'
                } 
              });
              console.log('Success: Registered ' + game.packageName);
            } catch (err) {
              // اگر پکیج از قبل وجود داشت یا پیام خاصی آمد، نمایش داده شود
              console.log('Status for ' + game.packageName + ': ' + (err.response ? JSON.stringify(err.response.data) : err.message));
            }
          }
        }
        deploy();
        "
