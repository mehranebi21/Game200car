name: Generate and Deploy 200 Heavy Graphics Games

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Base Dependencies
      run: |
        npm init -y
        npm install axios  # برای ارسال راحت اطلاعات به API آپتوید

    - name: Generate 200 Unique Games
      run: node generator.js

    - name: Authenticate and Upload to Aptoide/Catappult API
      env:
        CLIENT_ID: ${{ secrets.CATA_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CATA_CLIENT_SECRET }}
      run: |
        node -e "
        const axios = require('axios');
        const fs = require('fs');
        const path = require('path');

        async function deploy() {
          try {
            console.log('Authenticating with Catappult API...');
            // دریافت توکن معتبر از آپتوید
            const authRes = await axios.post('https://api.catappult.io/oauth/token', {
              grant_type: 'client_credentials',
              client_id: process.env.CLIENT_ID,
              client_secret: process.env.CLIENT_SECRET
            });
            
            const token = authRes.data.access_token;
            const metadata = JSON.parse(fs.readFileSync('dist/games_metadata.json', 'utf8'));

            for (const game of metadata) {
              console.log('Uploading metadata and preparing slot for:', game.name);
              
              // ۱. ایجاد یا آپدیت برنامه در مارکت با پکیج نام اختصاصی
              await axios.post('https://api.catappult.io/v1/applications', {
                packageName: game.packageName,
                title: game.name,
                description: 'Experience pure speed in this advanced 3D vector simulation. High-end graphics with ultra responsive handling.',
                category: 'GAME_RACING'
              }, { headers: { Authorization: 'Bearer ' + token } });

              console.log('Successfully registered: ' + game.packageName);
              // توجه: برای آپلود فایل فیزیکی APK نهایی در گیت هاب به صورت اتوماتیک، 
              // ابزارهایی مثل Cordova یا فرآیند لود مستقیم zip وب در قالب کاتاپولت اعمال می‌شود.
            }
          } catch (err) {
            console.error('Deployment Error:', err.response ? err.response.data : err.message);
            process.exit(1); // اگر ارور داد متوقف شود تا سریعاً متوجه شوید
          }
        }
        deploy();
        "
