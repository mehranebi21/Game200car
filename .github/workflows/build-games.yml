name: Generate and Deploy 200 Heavy Graphics Games

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Base Dependencies
      run: |
        sudo apt-get install zip -y
        npm init -y
        npm install axios form-data

    - name: Generate 200 Unique Games
      run: node generator.js

    - name: Direct Upload File and Metadata to Aptoide
      env:
        MY_APTOIDE_TOKEN: ${{ secrets.CATA_CLIENT_ID }}
      run: |
        node -e "
        const axios = require('axios');
        const fs = require('fs');
        const FormData = require('form-data');

        async function deploy() {
          const token = process.env.MY_APTOIDE_TOKEN;
          const metadata = JSON.parse(fs.readFileSync('dist/games_metadata.json', 'utf8'));

          for (const game of metadata) {
            console.log('Deploying file and registering: ' + game.name);
            
            try {
              // ایجاد فرم داده برای ارسال همزمان متاداتا و فایل فیزیکی بازی
              const form = new FormData();
              form.append('packageName', game.packageName);
              form.append('title', game.name);
              form.append('description', 'High performance 3D racing game with unique environment.');
              form.append('category', 'GAME_RACING');
              
              if (fs.existsSync(game.zipPath)) {
                form.append('file', fs.createReadStream(game.zipPath));
              }

              await axios.post('https://api.catappult.io/v1/applications', form, { 
                headers: { 
                  ...form.getHeaders(),
                  'Authorization': 'Bearer ' + token
                } 
              });
              console.log('Successfully fully deployed: ' + game.packageName);
            } catch (err) {
              console.log('Skip or Error on: ' + game.packageName + ' -> ' + err.message);
            }
          }
        }
        deploy();
        "
