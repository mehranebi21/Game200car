name: Generate and Deploy 200 Heavy Graphics Games

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Base Dependencies
      run: |
        npm init -y
        npm install axios

    - name: Generate 200 Unique Games
      run: node generator.js

    - name: Direct Upload to Aptoide/Catappult
      env:
        MY_APTOIDE_TOKEN: ${{ secrets.CATA_CLIENT_ID }}
      run: |
        node -e "
        const axios = require('axios');
        const fs = require('fs');

        async function deploy() {
          try {
            const token = process.env.MY_APTOIDE_TOKEN;
            const metadata = JSON.parse(fs.readFileSync('dist/games_metadata.json', 'utf8'));

            console.log('Connecting directly using your personal token...');

            for (const game of metadata) {
              console.log('Registering game: ' + game.name);
              
              // ارسال مستقیم به API اصلی بدون نیاز به گرفتن توکن مجدد
              try {
                await axios.post('https://api.catappult.io/v1/applications', {
                  packageName: game.packageName,
                  title: game.name,
                  description: 'Experience pure speed in this advanced 3D vector simulation. High-end graphics with ultra responsive handling.',
                  category: 'GAME_RACING'
                }, { 
                  headers: { 
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                  } 
                });
                console.log('Successfully registered: ' + game.packageName);
              } catch (singleError) {
                console.log('Notice for ' + game.packageName + ': ' + (singleError.response ? JSON.stringify(singleError.response.data) : singleError.message));
              }
            }
          } catch (err) {
            console.error('Fatal Deployment Error:', err.message);
            process.exit(1);
          }
        }
        deploy();
        "
